<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JULI CONSOLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --neon-cyan: #00fff5;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --bg-dark: #06060e;
    --bg-panel: #0d0d1f;
    --bg-card: #111128;
    --border-glow: #1a1a3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: white;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT flicker */
  @keyframes flicker {
    0%, 97%, 100% { opacity: 1; }
    98% { opacity: 0.92; }
    99% { opacity: 0.96; }
  }
  body { animation: flicker 8s infinite; }

  /* ===== HEADER ===== */
  header {
    background: var(--bg-panel);
    border-bottom: 2px solid var(--neon-cyan);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: relative;
    box-shadow: 0 0 30px rgba(0,255,245,0.15);
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan);
    letter-spacing: 2px;
    line-height: 1.4;
  }

  .logo span {
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink), 0 0 30px var(--neon-pink);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: #555;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon-green);
    box-shadow: 0 0 8px var(--neon-green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .clock {
    color: var(--neon-yellow);
    font-size: 12px;
  }

  /* ===== LAYOUT ===== */
  .console-body {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 64px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border-glow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #333;
    letter-spacing: 3px;
    padding: 16px 20px 8px;
    text-transform: uppercase;
  }

  .game-list {
    flex: 1;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .game-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    transition: left 0.4s ease;
  }

  .game-card:hover::before { left: 100%; }

  .game-card:hover {
    border-color: var(--card-color, var(--neon-cyan));
    box-shadow: 0 0 20px rgba(0,255,245,0.1), inset 0 0 20px rgba(0,255,245,0.03);
    transform: translateX(4px);
  }

  .game-card.active {
    border-color: var(--card-color, var(--neon-cyan));
    background: rgba(0,255,245,0.05);
    box-shadow: 0 0 25px rgba(0,255,245,0.15);
  }

  .game-card.active::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-color, var(--neon-cyan));
    box-shadow: 0 0 10px var(--card-color, var(--neon-cyan));
  }

  .card-emoji {
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 10px;
    color: #444;
    line-height: 1.4;
  }

  .card-badge {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 8px;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Press Start 2P', monospace;
    background: rgba(0,0,0,0.5);
    border: 1px solid currentColor;
  }

  /* ===== DECORATIVE BOTTOM ===== */
  .sidebar-deco {
    padding: 16px 20px;
    border-top: 1px solid var(--border-glow);
  }

  .power-bar {
    display: flex;
    gap: 3px;
    margin-bottom: 8px;
  }

  .power-seg {
    flex: 1;
    height: 4px;
    background: var(--neon-green);
    border-radius: 2px;
    box-shadow: 0 0 6px var(--neon-green);
    opacity: 0.9;
  }

  .power-seg:last-child { background: #222; box-shadow: none; opacity: 1; }

  .sidebar-text {
    font-size: 9px;
    color: #333;
    letter-spacing: 1px;
  }

  /* ===== GAME AREA ===== */
  .game-area {
    position: relative;
    background: #000;
    overflow: hidden;
  }

  .screen-home {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: radial-gradient(ellipse at center, #0d0d2e 0%, #06060e 70%);
  }

  .home-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 36px;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px var(--neon-cyan), 0 0 100px rgba(0,255,245,0.3);
    animation: glitch 4s infinite;
    line-height: 1.3;
    text-align: center;
  }

  @keyframes glitch {
    0%, 90%, 100% { 
      clip-path: none; 
      transform: none;
      text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px var(--neon-cyan);
    }
    91% { 
      transform: translate(-2px, 0);
      text-shadow: 3px 0 var(--neon-pink), -3px 0 var(--neon-cyan);
    }
    92% { 
      transform: translate(2px, 0);
      text-shadow: -3px 0 var(--neon-pink), 3px 0 var(--neon-cyan);
    }
    93% { transform: none; }
  }

  .home-sub {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--neon-pink);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 10px var(--neon-pink);
  }

  .home-prompt {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #444;
    letter-spacing: 2px;
    animation: blink 1.2s step-end infinite;
    margin-top: 16px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .grid-deco {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,255,245,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,245,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .grid-deco::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--bg-dark) 100%);
  }

  .home-emojis {
    display: flex;
    gap: 32px;
    font-size: 40px;
    filter: grayscale(0.3);
  }

  .home-emoji-item {
    animation: float 3s ease-in-out infinite;
    cursor: pointer;
    transition: filter 0.2s;
  }

  .home-emoji-item:hover { filter: drop-shadow(0 0 16px white); }

  .home-emoji-item:nth-child(1) { animation-delay: 0s; }
  .home-emoji-item:nth-child(2) { animation-delay: 0.5s; }
  .home-emoji-item:nth-child(3) { animation-delay: 1s; }
  .home-emoji-item:nth-child(4) { animation-delay: 1.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* ===== IFRAME ===== */
  #gameFrame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  /* ===== LOADING ===== */
  .loading-screen {
    position: absolute;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
  }

  .loading-screen.show { display: flex; }

  .loading-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    letter-spacing: 2px;
  }

  .loading-bar-wrap {
    width: 240px;
    height: 12px;
    background: #111;
    border: 1px solid #333;
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    box-shadow: 0 0 10px var(--neon-cyan);
    animation: load 1.2s ease-out forwards;
  }

  @keyframes load {
    from { width: 0%; }
    to { width: 100%; }
  }

  .loading-dots {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #333;
    letter-spacing: 3px;
    animation: blink 0.8s step-end infinite;
  }
</style>

</head>

<script>
  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Game cards reference for loadGameByIndex
  const cards = document.querySelectorAll('.game-card');

  function loadGameByIndex(i) {
    cards[i].click();
  }

  function loadGame(card, url, name) {
    cards.forEach(c => c.classList.remove('active'));
    card.classList.add('active');

    document.getElementById('homeScreen').style.display = 'none';

    const loading = document.getElementById('loadingScreen');
    const bar = document.getElementById('loadingBar');
    const title = document.getElementById('loadingTitle');

    title.textContent = '¡ INICIANDO ' + name.toUpperCase() + ' !';

    bar.style.animation = 'none';
    bar.offsetHeight;
    bar.style.animation = '';

    loading.classList.add('show');

    setTimeout(() => {
      window.open(url, '_blank');
      loading.classList.remove('show');
      cards.forEach(c => c.classList.remove('active'));
      document.getElementById('homeScreen').style.display = 'flex';
    }, 1400);
  }
</script>
